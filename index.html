<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmoni Nusantara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5cf66;
            --gold-glow: rgba(245, 207, 102, 0.4);
            --deep-bg: #030712;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--deep-bg);
            font-family: 'Montserrat', sans-serif;
        }

        /* 1. WADAH UTAMA GERBANG FRONT-END */
        #welcome-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 9999;
            overflow: hidden;
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
            transition: transform 1.4s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.4s ease, visibility 1.4s;
        }

        /* Aksi transisi menutup/membuka gerbang tirai */
        #welcome-container.open {
            transform: translateY(-100%);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* 2. BACKGROUND ANIMASI JALAN (KEN BURNS EFFECT) */
        .bg-cinematic {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://wallpaperaccess.com/full/21963.jpg');
            background-size: cover;
            background-position: center;
            animation: kenBurns 25s ease infinite alternate;
            z-index: 1;
        }

        @keyframes kenBurns {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.12) translate(-1%, -1%); }
        }

        /* 3. GRADIENT OVERLAY MEWAH (Membuat teks tajam & menghilangkan gelap kusam) */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(3, 7, 18, 0.4) 0%, 
                rgba(11, 25, 44, 0.65) 50%, 
                rgba(3, 7, 18, 0.85) 100%);
            z-index: 2;
        }

        /* 4. KONTEN TEKS & ATRIBUT */
        .welcome-content {
            position: relative;
            z-index: 3;
            padding: 0 20px;
            max-width: 900px;
            animation: fadeInContent 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInContent {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .welcome-content p.subtitle-top {
            font-size: clamp(0.75rem, 2.5vw, 0.95rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #e2e8f0;
            font-weight: 200;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .welcome-content h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.2rem, 7.5vw, 4.8rem);
            font-weight: 600;
            letter-spacing: 16px;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 20px;
            /* Efek teks gradasi metalik elegan */
            background: linear-gradient(to bottom, #ffffff 40%, #e2e8f0 70%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            animation: letterSpacingExpand 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes letterSpacingExpand {
            0% { letter-spacing: 6px; }
            100% { letter-spacing: 16px; }
        }

        .welcome-content p.subtitle-bottom {
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 400;
            margin-bottom: 50px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* 5. TOMBOL JELAJAHI - GLOWING LUXURY INTERACTION */
        .btn-luxury {
            position: relative;
            display: inline-block;
            outline: none;
            border: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            text-transform: uppercase;
            color: #050505;
            background: linear-gradient(135deg, #f5cf66 0%, #d4af37 100%);
            padding: 18px 55px;
            font-size: 0.9rem;
            letter-spacing: 5px;
            border-radius: 2px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(212, 175, 55, 0.3);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Efek Efek Aura Bersinar Melingkar di Balik Tombol */
        .btn-luxury::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: inherit;
            border-radius: inherit;
            z-index: -1;
            transform: scale(1);
            opacity: 0.5;
            transition: all 0.5s ease;
        }

        .btn-luxury:hover {
            color: #ffffff;
            background: transparent;
            box-shadow: 0 0 35px var(--gold-glow), inset 0 0 0 2px var(--gold);
            transform: translateY(-4px);
        }

        .btn-luxury:hover::before {
            transform: scale(1.25);
            opacity: 0;
        }

        .btn-luxury:active {
            transform: translateY(-1px);
        }

        /* 6. IFRAME UTAMA */
        .iframe-container {
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Ganti bagian div atau iframe lama kamu dengan ini -->
<div id="youtube-player">
    <iframe width="100%" height="100%" 
            src="https://www.youtube.com/embed/2P9CVWVZtiR_s8z-?autoplay=1&loop=1&playlist=2P9CVWVZtiR_s8z-&controls=0&mute=1&rel=0&modestbranding=1&disablekb=1&fs=0" 
            frameborder="0" allow="autoplay">
    </iframe>
</div>
    
    <div id="welcome-container">
        <!-- Struktur Background Bergerak Dinamis -->
        <div class="bg-cinematic"></div>
        <div class="bg-overlay"></div>
        
        <!-- Area Teks Utama -->
        <div class="welcome-content">
            <p class="subtitle-top">A Curated Collection of</p>
            <h1>WONDERFUL OF INDONESIA</h1>
            <p class="subtitle-bottom">Natural Wonders & Human Legacies</p>
            <button id="btnJelajahi" class="btn-luxury">JELAJAHI</button>
        </div>
    </div>

    <script src="welcome.js"></script>

</body>
</html>
