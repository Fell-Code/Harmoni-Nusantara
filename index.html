<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Wonderful Indonesia</title>
    <style>
        /* CSS DIGABUNG DI SINI */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }

        .welcome-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Pastikan path gambar Anda benar */
            background: url('https://wallpaperaccess.com/full/22613.jpg') no-repeat center center/cover;
            z-index: 100;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Hitam transparan */
        }

        .content { position: relative; z-index: 101; text-align: center; color: white; }

        #btn-jelajahi {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: gold;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcome-container" class="welcome-container">
        <div class="overlay"></div>
        <div class="content">
            <h1>WONDERFUL OF INDONESIA</h1>
            <p>NATURAL WONDERS & HUMAN LEGACIES</p>
            <button id="btn-jelajahi">JELAJAHI</button>
        </div>
    </div>

    <div id="main-content" style="display: none; height: 100vh;">
        <iframe id="main-frame" src="" width="100%" height="100%" frameborder="0"></iframe>
    </div>

    <div id="player" style="display: none;"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="welcome.js"></script>
</body>
</html>
