<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmoni Nusantara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <style>
        :root {
            --gold: #f5cf66;
            --gold-glow: rgba(245, 207, 102, 0.4);
            --deep-bg: #030712;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: var(--deep-bg); font-family: 'Montserrat', sans-serif;
        }

        /* STYLE GERBANG / TIRAI WELCOME */
        #welcome-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            z-index: 9999; overflow: hidden; transform: translateY(0); opacity: 1; visibility: visible;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.2s ease, visibility 1.2s;
        }

        #welcome-container.open {
            transform: translateY(-100%); opacity: 0; visibility: hidden; pointer-events: none;
        }

        .bg-cinematic {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://wallpaperaccess.com/full/21963.jpg');
            background-size: cover; background-position: center;
            animation: kenBurns 25s ease infinite alternate; z-index: 1;
        }

        @keyframes kenBurns {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.12) translate(-1%, -1%); }
        }

        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(3, 7, 18, 0.4) 0%, rgba(11, 25, 44, 0.65) 50%, rgba(3, 7, 18, 0.85) 100%);
            z-index: 2;
        }

        .welcome-content { position: relative; z-index: 3; padding: 0 20px; max-width: 900px; }

        .welcome-content h1 {
            font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 7.5vw, 4.8rem); font-weight: 600;
            letter-spacing: 16px; color: #ffffff; margin-bottom: 20px;
            background: linear-gradient(to bottom, #ffffff 40%, #e2e8f0 70%, #94a3b8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-luxury {
            position: relative; outline: none; border: none;
            font-family: 'Cinzel', serif; font-weight: 700; text-transform: uppercase; color: #050505;
            background: linear-gradient(135deg, #f5cf66 0%, #d4af37 100%);
            padding: 18px 55px; cursor: pointer; transition: all 0.5s;
        }

        /* STYLE KONTEN UTAMA (KONTEN HOME) */
        .main-content-wrapper {
            width: 100%; height: 100vh; position: relative; z-index: 1;
            display: none; /* Awalnya disembunyikan agar tidak tumpang tindih */
        }
        .main-content-wrapper.active {
            display: block; /* Muncul saat gerbang terbuka */
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -100;
            background-image: url('https://wallpaperaccess.com/full/21963.jpg');
            background-size: cover; background-position: center; filter: brightness(0.5);
        }

        .container { background-color: transparent !important; }
        .back-trigger { cursor: pointer; transition: color 0.3s ease, letter-spacing 0.3s ease; }
        .back-trigger:hover { color: #f5cf66 !important; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="welcome-container">
        <div class="bg-cinematic"></div>
        <div class="bg-overlay"></div>
        <div class="welcome-content">
            <p style="color:#e2e8f0; letter-spacing:8px; margin-bottom:15px;">A CURATED COLLECTION OF</p>
            <h1>WONDERFUL OF INDONESIA</h1>
            <p style="color:var(--gold); letter-spacing:6px; margin-bottom:50px;">NATURAL WONDERS & HUMAN LEGACIES</p>
            <button id="btnJelajahi" class="btn-luxury">JELAJAHI</button>
        </div>
    </div>

    <div id="mainContent" class="main-content-wrapper">
        <div class="bg-container"></div>

        <section class="container">
            <header class="header">
                <div class="name back-trigger" id="btnKembali">← FELL DEVELOPER</div>
                <div class="class">INDONESIA</div>
            </header>

            <div class="judulharmoninusantara">
                <span class="top-tagline">NATURE WORLD OF INDONESIA</span>
                <h1 class="main-title">HARMONI<br>NUSANTARA</h1>
                <div class="unity-badge">BHINNEKA TUNGGAL IKA</div>
            </div>

            <nav class="bottom-menu">
                <a href="javascript:void(0);" class="nav-card" style="--bg-url: url('https://png.pngtree.com/thumb_back/fh260/background/20240912/pngtree-borobudur-temple-at-sunrise-with-mountain-view-in-indonesia-image_16166646.jpg')">
                    <span class="label">Pemandangan</span>
                    <span class="sub">Bentang Alam Megah</span>
                </a>
                <a href="javascript:void(0);" class="nav-card" style="--bg-url: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj0FRMr1TdZBc4pdrPKi4_V8uNWUJu523W9SdAZZRCT5-HMAmQanplHjUTtKBAV5W9kvDSq6I7M7breI6mgC7ueDxjpoXD0U6P9lyx-HyAGcKNgjGUnd8kEwhOg9J-xXM8u4Gm8cUjj02c2/s1600/wayang.jpg')">
                    <span class="label">Budaya</span>
                    <span class="sub">Tradisi & Warisan</span>
                </a>
                <a href="javascript:void(0);" class="nav-card" style="--bg-url: url('https://millionbloom.com/cdn/shop/articles/20_Daftar_Nama_nama_Bunga_di_Indonesia_yang_Sangat_Langka_1500x.jpg?v=1712050485')">
                    <span class="label">Flora</span>
                    <span class="sub">Eksotisme Tanaman</span>
                </a>
                <a href="javascript:void(0);" class="nav-card" style="--bg-url: url('https://lister.co.id/wp-content/uploads/2023/08/Peta-Persebaran-Flora-dan-Fauna-di-Indonesia-Ada-3-Jenis.jpg')">
                    <span class="label">Fauna</span>
                    <span class="sub">Satwa Endemik</span>
                </a>
                <a href="javascript:void(0);" class="nav-card" style="--bg-url: url('https://www.jakartamu.com/wp-content/uploads/2024/12/map-of-indonesia-large-1068x610-1.jpg')">
                    <span class="label">Sejarah</span>
                    <span class="sub">Warisan Hidup</span>
                </a>
            </nav>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const btnJelajahi = document.getElementById("btnJelajahi");
            const btnKembali = document.getElementById("btnKembali");
            const welcomeContainer = document.getElementById("welcome-container");
            const welcomeContent = document.querySelector(".welcome-content");
            const mainContent = document.getElementById("mainContent");
            const navCards = document.querySelectorAll(".nav-card");

            // Fungsi Tombol Jelajahi (Buka Gerbang)
            if (btnJelajahi && welcomeContainer) {
                btnJelajahi.addEventListener("click", function(e) {
                    e.preventDefault();
                    if (welcomeContent) {
                        welcomeContent.style.transition = "opacity 0.4s ease";
                        welcomeContent.style.opacity = "0";
                    }
                    setTimeout(function() {
                        if (mainContent) mainContent.classList.add("active");
                        welcomeContainer.classList.add("open");
                    }, 300);
                });
            }

            // Fungsi Tombol Panah Kiri Atas (Tutup Gerbang)
            if (btnKembali && welcomeContainer) {
                btnKembali.addEventListener("click", function() {
                    welcomeContainer.classList.remove("open");
                    if (welcomeContent) {
                        welcomeContent.style.opacity = "1";
                    }
                    setTimeout(function() {
                        if (mainContent) mainContent.classList.remove("active");
                    }, 1200); // Sinkron dengan durasi transisi tirai
                });
            }

            // Fungsi Pendukung: ESC Key untuk Menutup Gerbang
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape' && welcomeContainer.classList.contains("open")) {
                    welcomeContainer.classList.remove("open");
                    if (welcomeContent) welcomeContent.style.opacity = "1";
                    setTimeout(function() {
                        if (mainContent) mainContent.classList.remove("active");
                    }, 1200);
                }
            });

            // Efek Animasi Hover Pada Kartu Menu Bawah
            navCards.forEach(function(card) {
                card.addEventListener("mouseenter", function() {
                    card.style.transform = "translateY(-10px) scale(1.02)";
                    card.style.boxShadow = "0 10px 25px rgba(245, 207, 102, 0.2)";
                    card.style.transition = "all 0.4s cubic-bezier(0.25, 1, 0.5, 1)";
                });
                card.addEventListener("mouseleave", function() {
                    card.style.transform = "translateY(0) scale(1)";
                    card.style.boxShadow = "none";
                });
                card.addEventListener("click", function(e) {
                    e.preventDefault();
                });
            });
        });
    </script>
</body>
</html>
