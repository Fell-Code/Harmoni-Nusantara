<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmoni Nusantara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f5cf66; --deep-bg: #030712; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--deep-bg); font-family: 'Montserrat', sans-serif; }

        /* Gerbang Utama */
        #welcome-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center; text-align: center;
            z-index: 9999; transition: transform 1.4s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.4s ease;
        }
        #welcome-container.open { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        /* Background */
        .bg-cinematic { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://wallpaperaccess.com/full/21963.jpg') no-repeat center/cover; animation: kenBurns 25s ease infinite alternate; z-index: 1; }
        @keyframes kenBurns { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.7); z-index: 2; }

        /* Konten */
        .welcome-content { position: relative; z-index: 3; padding: 0 20px; color: white; }
        h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; letter-spacing: 16px; margin-bottom: 20px; }
        .btn-luxury { cursor: pointer; padding: 18px 55px; background: var(--gold); border: none; font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; }

        /* Iframe */
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>

    <div id="welcome-container">
        <div class="bg-cinematic"></div>
        <div class="bg-overlay"></div>
        <div class="welcome-content">
            <h1>WONDERFUL OF INDONESIA</h1>
            <button id="btnJelajahi" class="btn-luxury">JELAJAHI</button>
        </div>
    </div>

    <iframe id="mainFrame" name="main_frame"></iframe>

    <script src="welcome.js"></script>
</body>
</html>
